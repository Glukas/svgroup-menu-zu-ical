name: Update Menu # Test

on:
  schedule:
    - cron: '0 5 * * *'  # täglich 5:00 UTC = 7:00 CEST (Sommerzeit)
  workflow_dispatch: {}   # manuelles Auslösen zum Testen

permissions:
  contents: write  

jobs:
  update-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch menus
        run: python scripts/fetch_menu.py

      - name: Upload debug HTML on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_page_*.html
          retention-days: 3

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Update menu data $(date -u +'%Y-%m-%d')"
          git push
